<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ブロックパズル</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        color: #fff;
      }
      .ui-bar {
        width: 100%; /* ゲームエリアに合わせて横幅を広げる */
        max-width: 300px; /* 必要に応じて最大幅 */
        display: flex;
        justify-content: flex-end; /* 右上に寄せる */
        align-items: center;
        margin-top: 10px;
        margin-bottom: 5px;
        padding-right: 5px; /* 少し右余白 */
        box-sizing: border-box;
      }

      #gameWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      #gameContainer {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center; /* canvasWrapper を左右中央に配置 */
        align-items: flex-start;
      }
      #gameCanvasWrapper {
        position: relative;
      }
      #gameCanvas {
        background: #111;
        border: 2px solid #fff;
        display: block;
      }
      #score {
        position: static;
        font-size: 20px;
      }
      #sidebar {
        position: absolute;
        left: calc(50% + 180px); /* canvas 幅300px /2 + 間隔20px + sidebar を右に配置 */
        top: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #nextBlocksCanvas {
        background: #111;
        border: 2px solid #fff;
      }
      #startBtn {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>ブロックパズル</h1>
    <div class="ui-bar"><div id="score">Score: 0</div></div>
    <div id="gameWrapper">
      <div id="gameContainer">
        <div id="gameCanvasWrapper">
          <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div id="sidebar">
          <canvas id="nextBlocksCanvas" width="140" height="220"></canvas>
        </div>
      </div>
      <button id="startBtn">ゲームスタート</button>
    </div>
    <script src="game.js"></script>
  </body>
</html>
