<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>マージタイル</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        color: #fff;
      }
      h1 {
        margin-top: 10px;
      }
      .ui-bar {
        width: 100%;
        max-width: 300px; /* gameCanvas 幅に合わせる */
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-top: 10px;
        margin-bottom: 5px;
        padding-right: 5px;
        box-sizing: border-box;
      }
      #score {
        font-size: 20px;
      }

      #gameWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
        position: relative;
      }

      #gameContainer {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center; /* gameCanvas を左右中央 */
        align-items: flex-start;
      }

      #gameCanvasWrapper {
        position: relative;
      }

      #gameCanvas {
        background: #111;
        border: 2px solid #fff;
        display: block;
      }

      #sidebar {
        position: absolute;
        left: calc(50% + 150px + 20px); /* canvas幅300px/2 + margin20px */
        top: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px; /* ブロック間の隙間 */
      }

      #nextBlocksCanvas {
        background: #111;
        border: 2px solid #fff;
        display: block;
      }

      #startBtn {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>マージタイル</h1>

    <!-- スコア表示 -->
    <div class="ui-bar">
      <div id="score">Score: 0</div>
    </div>

    <div id="gameWrapper">
      <div id="gameContainer">
        <div id="gameCanvasWrapper">
          <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div id="sidebar">
          <canvas id="nextBlocksCanvas" width="120" height="180"></canvas>
        </div>
      </div>
      <button id="startBtn">ゲームスタート</button>
    </div>

    <script src="game.js"></script>
  </body>
</html>
