<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ブロックプレイスパズル</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        color: #fff;
      }
      .ui-bar {
        width: 500px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-top: 10px;
        margin-bottom: 5px;
      }
      #score {
        font-size: 18px;
      }
      #gameCanvas {
        background: #111;
        display: block;
        border: 2px solid #fff;
        margin-top: 5px;
      }
      #nextBlocksContainer {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .nextBlockCanvas {
        background: #111;
        border: 2px solid #fff;
      }
      #startBtn {
        padding: 10px 20px;
        font-size: 18px;
        margin: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>ブロックプレイスパズル</h1>

    <div class="ui-bar">
      <div id="score">Score: 0</div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div id="nextBlocksContainer">
      <canvas class="nextBlockCanvas" width="120" height="120"></canvas>
      <canvas class="nextBlockCanvas" width="120" height="120"></canvas>
      <canvas class="nextBlockCanvas" width="120" height="120"></canvas>
    </div>

    <button id="startBtn">ゲームスタート</button>

    <script src="game.js"></script>
  </body>
</html>
