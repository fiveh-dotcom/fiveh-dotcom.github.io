<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>カラータイル</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        color: #fff;
      }

      .ui-bar {
        width: 500px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        margin-bottom: 5px;
      }

      #timeBarContainer {
        width: 200px;
        height: 20px;
        background: #555;
        border: 1px solid #fff;
      }

      #timeBar {
        height: 100%;
        background: #0f0;
        width: 100%;
      }

      #score {
        font-size: 18px;
      }

      #gameCanvas {
        background: #111;
        display: block;
        border: 2px solid #fff;
        margin-top: 5px;
      }

      #startBtn {
        padding: 10px 20px;
        font-size: 18px;
        margin: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>カラータイル</h1>

    <div class="ui-bar">
      <div id="timeBarContainer">
        <div id="timeBar"></div>
      </div>
      <div id="score">Score: 0</div>
    </div>

    <canvas id="gameCanvas" width="500" height="600"></canvas>
    <button id="startBtn">ゲームスタート</button>

    <script src="game.js"></script>
  </body>
</html>
