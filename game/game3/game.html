<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ブロック崩し</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        color: #fff;
      }

      h1 {
        margin-top: 10px;
      }

      .ui-bar {
        width: 100%;
        max-width: 400px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-top: 15px;
        margin-bottom: 5px;
        padding-right: 5px;
        box-sizing: border-box;
      }

      #gameWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      #gameCanvas {
        background: #111;
        border: 2px solid #fff;
        display: block;
        touch-action: none;
      }

      #score {
        font-size: 20px;
      }

      #startBtn {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>ブロック崩し</h1>
    <div class="ui-bar"><div id="score">Score: 0</div></div>
    <div id="gameWrapper">
      <canvas id="gameCanvas" width="400" height="600"></canvas>
      <button id="startBtn">ゲームスタート</button>
    </div>
    <script src="game.js"></script>
  </body>
</html>
