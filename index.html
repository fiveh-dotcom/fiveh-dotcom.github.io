<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>株式会社ファイブエイチ</title>
    <meta
      name="description"
      content="岩手県花巻市の株式会社ファイブエイチは硬さ試験機の検証サービスを提供しています。"
    />
    <meta name="google-site-verification" content="ENHh9ROvN1zY8XnZWZpDAFNbN4Y9lAPFAVYvojl1hEU" />
    <link rel="icon" href="images/favicon.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preload" as="image" href="images/background.jpg" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo-link">
        <img src="images/logo_white.png" alt="株式会社ファイブエイチ ロゴ" class="logo" />
        <span class="company-name">株式会社ファイブエイチ</span>
      </a>

      <nav class="main-nav">
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="services.html">サービス</a></li>
          <li><a href="about.html">会社情報</a></li>
          <li><a href="faq.html">よくあるご質問</a></li>
          <li><a href="contact.html">お問い合わせ・ご依頼</a></li>
        </ul>
      </nav>
    </header>

    <!-- ヒーロー -->
    <section class="hero">
      <div class="hero-header">
        <!-- 会社ロゴ -->
        <img
          src="images/logo_white.png"
          alt="株式会社ファイブエイチ ロゴ"
          class="hero-logo"
          id="secretLogo"
        />

        <!-- 会社名 -->
        <h1 class="hero-company-name">株式会社ファイブエイチ</h1>
      </div>

      <!-- キャッチコピー -->
      <h2>硬さ試験機のメンテナンス・検証・修理なら</h2>
      <p>出張検証や定期点検、故障対応まで、信頼のサービスを提供します</p>
    </section>

    <!-- ニュース -->
    <section class="news">
      <h2>ニュース</h2>
      <p>2026/02/22 - ホームページを公開しました</p>
    </section>

    <!-- ゲーム選択画面 -->
    <div
      id="gameMenu"
      style="
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        z-index: 9999;
        color: #fff;
        text-align: center;
        padding-top: 100px;
      "
    >
      <h2>🎮 Secret Games</h2>

      <button class="gameBtn" data-game="game/game1/game.html">カラータイル</button>
      <button class="gameBtn" data-game="game/game2/game.html">ブロックパズル</button>
      <button class="gameBtn" data-game="game/game3/game.html">ブロック崩し</button>
      <button class="gameBtn" data-game="game/game4/game.html">ブロックプレイスパズル</button>
      <button class="gameBtn" data-game="game/game5/game.html">マージタイル</button>

      <br /><br />
      <button id="closeMenu">閉じる</button>
    </div>

    <!-- ゲーム表示 -->
    <div
      id="gameContainer"
      style="position: fixed; inset: 0; background: #000; display: none; z-index: 10000"
    >
      <!-- 戻るボタン -->
      <button id="backToMenu" style="position: absolute; top: 10px; left: 10px; z-index: 10001">
        ← メニューに戻る
      </button>

      <!-- 閉じるボタン -->
      <button id="closeGame" style="position: absolute; top: 10px; right: 10px; z-index: 10001">
        ✕
      </button>

      <iframe id="gameFrame" style="width: 100%; height: 100%; border: none"> </iframe>
    </div>

    <script>
      window.addEventListener("load", () => {
        document.querySelector(".hero").classList.add("show");
      });
      (function () {
        const logo = document.getElementById("secretLogo");
        const menu = document.getElementById("gameMenu");
        const container = document.getElementById("gameContainer");
        const frame = document.getElementById("gameFrame");

        const closeMenu = document.getElementById("closeMenu");
        const closeGame = document.getElementById("closeGame");

        let clickCount = 0;
        let timer = null;

        // ロゴ5回クリック
        logo.addEventListener("click", () => {
          clickCount++;

          clearTimeout(timer);
          timer = setTimeout(() => (clickCount = 0), 3000);

          if (clickCount >= 5) {
            menu.style.display = "block";
            clickCount = 0;
          }
        });

        // ゲーム選択
        document.querySelectorAll(".gameBtn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const game = btn.dataset.game;

            frame.src = game;
            menu.style.display = "none";
            container.style.display = "block";
          });
        });

        // 閉じる
        closeMenu.addEventListener("click", () => {
          menu.style.display = "none";
        });

        closeGame.addEventListener("click", () => {
          container.style.display = "none";
          frame.src = "";
        });

        // ゲーム画面からメニューに戻る
        backToMenu.addEventListener("click", () => {
          container.style.display = "none"; // ゲーム画面を隠す
          menu.style.display = "block"; // メニューを表示
          frame.src = ""; // iframe をリセット
        });
      })();
    </script>

    <footer>
      <p>株式会社ファイブエイチ | 〒028-0105 岩手県花巻市東和町前田9区326番地2</p>
      <p>© 2025 株式会社ファイブエイチ All Rights Reserved.</p>
    </footer>
  </body>
</html>
